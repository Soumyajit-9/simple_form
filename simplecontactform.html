<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="./css/simplecontactform.css">
</head>
<body>
    <h1>Simple Contact Form</h1>
    <form action="">
        <label for="first_name">First Name</label>
        <input type="text" id="first_name" name="Firstname" placeholder="first name">
        <label for="last_name">Last Name</label>
        <input type="text" id="last_name" name="lastname" placeholder="last name">
        <label for="email">Email</label>
        <input type="text" id="email" name="Email" placeholder="email">
        <label for="phone">Phone Number</label>
        <input type="text" name="phone" id="phone" placeholder="phone number">
        <label for="city">City</label>
        <input type="text" name="city" id="city" placeholder="city">
        <label for="msg">Message</label>
        <textarea name="msg" id="msg" placeholder="Message"></textarea>
        <input type="submit" value="send">
    </form>
</body>
</html>
